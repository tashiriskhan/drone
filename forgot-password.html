<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | InGraviton</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="text-gray-800 antialiased overflow-x-hidden bg-gray-50">

    <nav class="fixed w-full z-50 py-6 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <a href="index.html" class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 bg-gradient-to-tr from-brand-dark to-brand-blue rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-brand-dark">InGraviton</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen pt-32 pb-16 flex items-center">
        <div class="max-w-md mx-auto px-6 lg:px-8 w-full">
            <div id="requestForm" class="bg-white rounded-2xl p-8 shadow-soft">
                <div class="text-center mb-8">
                    <i class="fa-solid fa-key text-4xl text-brand-blue mb-4"></i>
                    <h1 class="text-3xl font-bold text-brand-dark mb-2">Forgot Password?</h1>
                    <p class="text-gray-500">Enter your email and we'll send you a reset link</p>
                </div>

                <form id="forgotPasswordForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none"
                            placeholder="you@example.com">
                    </div>

                    <div id="errorMessage" class="hidden text-red-500 text-sm"></div>
                    <div id="successMessage" class="hidden text-green-500 text-sm"></div>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-4 rounded-full font-medium hover:bg-blue-600 transition-all duration-300">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="login.html" class="text-brand-blue hover:underline font-medium">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Login
                    </a>
                </div>
            </div>

            <div id="successState" class="hidden bg-white rounded-2xl p-8 shadow-soft text-center">
                <i class="fa-solid fa-envelope-circle-check text-6xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-brand-dark mb-2">Check Your Email!</h2>
                <p class="text-gray-500 mb-6">If an account exists with that email, we've sent a password reset link.</p>
                <a href="login.html" class="inline-block px-8 py-3 bg-brand-blue text-white rounded-full font-medium hover:bg-blue-600 transition-all duration-300">
                    Back to Login
                </a>
            </div>
        </div>
    </section>

    <script type="module">
        const API_BASE = import.meta.env.VITE_API_URL || 'http://localhost:5000/api';

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorMessage.textContent = 'Please enter a valid email address';
                errorMessage.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Sending...';

            try {
                const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                // Always show success for security (don't reveal if email exists)
                document.getElementById('requestForm').classList.add('hidden');
                document.getElementById('successState').classList.remove('hidden');
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
