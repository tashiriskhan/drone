<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | InGraviton</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain.com/reset-password.html">
    <meta property="og:title" content="Reset Password | InGraviton">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="text-gray-800 antialiased overflow-x-hidden bg-gray-50">

    <nav class="fixed w-full z-50 py-6 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <a href="index.html" class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 bg-gradient-to-tr from-brand-dark to-brand-blue rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-brand-dark">InGraviton</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen pt-32 pb-16 flex items-center">
        <div class="max-w-md mx-auto px-6 lg:px-8 w-full">
            <div id="resetForm" class="bg-white rounded-2xl p-8 shadow-soft">
                <div class="text-center mb-8">
                    <i class="fa-solid fa-lock text-4xl text-brand-blue mb-4"></i>
                    <h1 class="text-3xl font-bold text-brand-dark mb-2">Reset Password</h1>
                    <p class="text-gray-500">Enter your new password</p>
                </div>

                <form id="passwordResetForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                        <div class="relative">
                            <input type="password" id="password" required minlength="8"
                                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none"
                                placeholder="At least 8 characters">
                            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div id="passwordStrength" class="mt-2 h-1 rounded-full transition-all duration-300 bg-gray-200 w-0"></div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                        <input type="password" id="confirmPassword" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none"
                            placeholder="Repeat your password">
                    </div>

                    <div id="errorMessage" class="hidden text-red-500 text-sm"></div>
                    <div id="successMessage" class="hidden text-green-500 text-sm"></div>

                    <button type="submit" id="submitBtn" class="w-full bg-brand-blue text-white py-4 rounded-full font-medium hover:bg-blue-600 transition-all duration-300">
                        Reset Password
                    </button>
                </form>
            </div>

            <div id="successState" class="hidden bg-white rounded-2xl p-8 shadow-soft text-center">
                <i class="fa-solid fa-check-circle text-6xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-brand-dark mb-2">Password Reset!</h2>
                <p class="text-gray-500 mb-6">Your password has been successfully reset.</p>
                <a href="login.html" class="inline-block px-8 py-3 bg-brand-blue text-white rounded-full font-medium hover:bg-blue-600 transition-all duration-300">
                    Sign In
                </a>
            </div>
        </div>
    </section>

    <script type="module">
        import { API_BASE } from '/src/js/api.js';

        document.getElementById('togglePassword').addEventListener('click', () => {
            const password = document.getElementById('password');
            const icon = document.getElementById('togglePassword').querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                password.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        });

        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
            const widths = ['w-1/4', 'w-2/4', 'w-3/4', 'w-full'];
            strengthBar.className = `mt-2 h-1 rounded-full transition-all duration-300 ${colors[strength - 1] || 'bg-gray-200'} ${widths[strength - 1] || 'w-0'}`;
        });

        document.getElementById('passwordResetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.classList.add('hidden');

            if (!token) {
                errorMessage.textContent = 'Invalid reset link. Please request a new password reset.';
                errorMessage.classList.remove('hidden');
                return;
            }

            if (password.length < 8) {
                errorMessage.textContent = 'Password must be at least 8 characters';
                errorMessage.classList.remove('hidden');
                return;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Resetting...';

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to reset password');
                }

                document.getElementById('resetForm').classList.add('hidden');
                document.getElementById('successState').classList.remove('hidden');
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
