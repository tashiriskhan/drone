<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | InGraviton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { dark: '#1a1d21', navy: '#0f172a', blue: '#3b82f6' } }
                }
            }
        }
    </script>
    <style>
        body { background: #f8fafc; }
        .nav-scrolled { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- NAVBAR (Simplified) -->
    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 py-4 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 bg-gradient-to-tr from-brand-dark to-brand-blue rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </div>
                <span class="text-xl font-bold text-brand-dark">InGraviton</span>
            </div>
            <div class="text-sm text-gray-500"><i class="fa-solid fa-lock mr-1"></i> Secure Checkout</div>
        </div>
    </nav>

    <!-- CHECKOUT SECTION -->
    <section class="pt-24 pb-20 min-h-screen">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                
                <!-- Forms (Left) -->
                <div class="lg:col-span-7 space-y-8">
                    
                    <!-- Contact -->
                    <div class="bg-white p-6 rounded-2xl shadow-soft">
                        <h2 class="text-xl font-bold text-brand-dark mb-4">Contact Information</h2>
                        <input type="email" placeholder="Email address" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                    </div>

                    <!-- Shipping -->
                    <div class="bg-white p-6 rounded-2xl shadow-soft">
                        <h2 class="text-xl font-bold text-brand-dark mb-4">Shipping Address</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" placeholder="First name" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                            <input type="text" placeholder="Last name" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                            <input type="text" placeholder="Address" class="md:col-span-2 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                            <input type="text" placeholder="City" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                            <input type="text" placeholder="Postal Code" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                        </div>
                    </div>

                    <!-- Payment -->
                    <div class="bg-white p-6 rounded-2xl shadow-soft">
                        <h2 class="text-xl font-bold text-brand-dark mb-4">Payment</h2>
                        <div class="space-y-4">
                            <label class="flex items-center gap-3 p-4 border border-brand-blue bg-blue-50 rounded-xl cursor-pointer">
                                <input type="radio" name="payment" checked class="text-brand-blue focus:ring-brand-blue">
                                <div class="flex-1">
                                    <div class="font-semibold text-brand-dark">Credit Card</div>
                                    <div class="text-xs text-gray-500">Visa, Mastercard, Amex</div>
                                </div>
                                <i class="fa-regular fa-credit-card text-gray-400"></i>
                            </label>
                            <label class="flex items-center gap-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="payment" class="text-brand-blue focus:ring-brand-blue">
                                <div class="flex-1">
                                    <div class="font-semibold text-brand-dark">PayPal</div>
                                </div>
                                <i class="fa-brands fa-paypal text-gray-400"></i>
                            </label>
                            
                            <div class="pt-4 grid grid-cols-2 gap-4">
                                <input type="text" placeholder="Card number" class="col-span-2 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                                <input type="text" placeholder="MM / YY" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                                <input type="text" placeholder="CVC" class="px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-brand-blue">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary (Right) -->
                <div class="lg:col-span-5">
                    <div class="bg-white p-6 rounded-2xl shadow-soft sticky top-24">
                        <h2 class="text-xl font-bold text-brand-dark mb-6">Order Summary</h2>
                        
                        <div class="space-y-4 mb-6 max-h-64 overflow-y-auto">
                            <div class="flex gap-4">
                                <div class="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1507581134177-2b85a9886043?q=80&w=200" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1">
                                    <div class="font-medium text-brand-dark">Phantom X1 Carbon</div>
                                    <div class="text-sm text-gray-500">Qty: 1</div>
                                </div>
                                <div class="font-medium text-brand-dark">$499.00</div>
                            </div>
                            <div class="flex gap-4">
                                <div class="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1527977966376-1c8408f9f108?q=80&w=200" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1">
                                    <div class="font-medium text-brand-dark">Flight Controller V4</div>
                                    <div class="text-sm text-gray-500">Qty: 2</div>
                                </div>
                                <div class="font-medium text-brand-dark">$498.00</div>
                            </div>
                        </div>

                        <div class="border-t border-gray-200 pt-4 space-y-2 mb-6">
                            <div class="flex justify-between text-gray-600">
                                <span>Subtotal</span>
                                <span>$997.00</span>
                            </div>
                            <div class="flex justify-between text-gray-600">
                                <span>Shipping</span>
                                <span class="text-green-600">Free</span>
                            </div>
                            <div class="flex justify-between text-xl font-bold text-brand-dark pt-2">
                                <span>Total</span>
                                <span>$1,076.76</span>
                            </div>
                        </div>

                        <button class="w-full bg-brand-dark text-white font-semibold py-4 rounded-xl hover:bg-gray-800 hover:shadow-glow transition-all duration-300">
                            Pay $1,076.76
                        </button>
                        
                        <div class="mt-4 flex justify-center gap-4 text-gray-400 text-2xl">
                            <i class="fa-brands fa-cc-visa"></i>
                            <i class="fa-brands fa-cc-mastercard"></i>
                            <i class="fa-brands fa-cc-paypal"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) navbar.classList.add('nav-scrolled');
            else navbar.classList.remove('nav-scrolled');
        });
    </script>
</body>
</html>
